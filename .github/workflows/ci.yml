name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Audit clean skill (must pass)
        run: python audit.py examples/clean-skill
      - name: Audit risky skill (demo, should report findings)
        run: python audit.py examples/risky-skill --no-fail --json data/last-audit.json
      - name: Show report
        run: cat data/last-audit.json
